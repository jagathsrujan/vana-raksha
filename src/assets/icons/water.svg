<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Water droplet main shape -->
  <path d="M32 8C32 8 16 24 16 36C16 44 22 48 32 48C42 48 48 44 48 36C48 24 32 8 32 8Z" stroke="#059669" stroke-width="2.5" fill="#d1fae5" stroke-linejoin="round"/>
  <!-- Declining water level arrow -->
  <line x1="24" y1="20" x2="40" y2="20" stroke="#059669" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="36" y1="16" x2="40" y2="20" stroke="#059669" stroke-width="2"/>
  <line x1="40" y1="20" x2="36" y2="24" stroke="#059669" stroke-width="2"/>
  <!-- Droplet inside (level) -->
  <path d="M32 26C32 26 20 38 20 44C20 49 24 50 32 50C40 50 44 49 44 44C44 38 32 26 32 26Z" fill="#059669" opacity="0.3"/>
  <!-- Well/pump pipe -->
  <rect x="29" y="48" width="6" height="10" rx="1" fill="#059669" opacity="0.4"/>
  <rect x="27" y="54" width="10" height="4" rx="1" fill="#059669" opacity="0.3"/>
  <!-- Ground line -->
  <line x1="14" y1="58" x2="50" y2="58" stroke="#059669" stroke-width="1.5" opacity="0.3"/>
  <!-- Small declining indicator arrows -->
  <text x="32" y="13" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#059669" text-anchor="middle" opacity="0.6">▼</text>
</svg>