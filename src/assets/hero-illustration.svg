<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- Background sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#sky)"/>

  <!-- FLOOD ZONE (left) -->
  <path d="M0 200Q100 180 200 200T400 200" stroke="#2563eb" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M0 215Q100 195 200 215T400 215" stroke="#2563eb" stroke-width="2.5" fill="none" opacity="0.4"/>
  <path d="M0 230Q100 210 200 230T400 230" stroke="#2563eb" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Rain cloud -->
  <ellipse cx="120" cy="60" rx="50" ry="25" fill="#94a3b8" opacity="0.7"/>
  <line x1="100" y1="80" x2="95" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <line x1="120" y1="82" x2="118" y2="105" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="80" x2="145" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <!-- Rain drops -->
  <line x1="105" y1="105" x2="102" y2="120" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="110" x2="118" y2="125" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <line x1="135" y1="105" x2="133" y2="120" stroke="#2563eb" stroke-width="1.5" opacity="0.5"/>
  <!-- Low building silhouettes -->
  <rect x="30" y="180" width="30" height="20" rx="2" fill="#1e293b" opacity="0.3"/>
  <rect x="70" y="170" width="25" height="30" rx="2" fill="#1e293b" opacity="0.3"/>
  <rect x="170" y="185" width="35" height="15" rx="2" fill="#1e293b" opacity="0.3"/>

  <!-- HEAT ZONE (center) -->
  <!-- Sun -->
  <circle cx="430" cy="70" r="35" fill="#f59e0b" opacity="0.8"/>
  <line x1="430" y1="25" x2="430" y2="10" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="430" y1="115" x2="430" y2="130" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="375" y1="70" x2="360" y2="70" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="485" y1="70" x2="500" y2="70" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="388" y1="37" x2="378" y2="27" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="472" y1="103" x2="482" y2="113" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="388" y1="103" x2="378" y2="113" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <line x1="472" y1="37" x2="482" y2="27" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
  <!-- Heat waves -->
  <path d="M370 160Q380 150 390 160" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M400 155Q410 145 420 155" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M430 150Q440 140 450 150" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M460 155Q470 145 480 155" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M490 160Q500 150 510 160" stroke="#dc2626" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Dry cracked ground -->
  <path d="M340 200L360 202L350 210L370 208L365 218L390 212" stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M430 200L440 203L435 212L455 210L450 218" stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Tall building silhouettes -->
  <rect x="370" y="120" width="20" height="80" rx="2" fill="#1e293b" opacity="0.4"/>
  <rect x="400" y="100" width="25" height="100" rx="2" fill="#1e293b" opacity="0.4"/>
  <rect x="440" y="115" width="20" height="85" rx="2" fill="#1e293b" opacity="0.4"/>

  <!-- WATER STRESS ZONE (right) -->
  <!-- Well/pump -->
  <rect x="600" y="145" width="8" height="50" rx="2" fill="#1e293b" opacity="0.5"/>
  <rect x="590" y="140" width="28" height="8" rx="2" fill="#1e293b" opacity="0.5"/>
  <!-- Declining water level -->
  <rect x="595" y="160" width="18" height="30" rx="2" fill="#059669" opacity="0.2"/>
  <rect x="595" y="175" width="18" height="15" rx="2" fill="#059669" opacity="0.15"/>
  <!-- Dotted water line declining -->
  <line x1="595" y1="165" x2="613" y2="165" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="595" y1="180" x2="613" y2="180" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="595" y1="192" x2="613" y2="192" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.15"/>
  <!-- Parched ground -->
  <path d="M570 200L590 203L585 212L605 210L600 218L620 215" stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Small building silhouettes -->
  <rect x="570" y="175" width="18" height="25" rx="2" fill="#1e293b" opacity="0.2"/>
  <rect x="630" y="180" width="15" height="20" rx="2" fill="#1e293b" opacity="0.2"/>

  <!-- Green canopy arch (top) -->
  <path d="M20 240Q200 120 400 130Q600 120 780 240" stroke="#059669" stroke-width="4" fill="none" opacity="0.3"/>
  <path d="M20 245Q200 130 400 138Q600 130 780 245" stroke="#059669" stroke-width="3" fill="none" opacity="0.2"/>
  <!-- Leaf accents -->
  <path d="M100 200Q115 170 130 200" stroke="#059669" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M400 120Q410 95 420 120" stroke="#059669" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M650 195Q660 170 670 195" stroke="#059669" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Zone labels -->
  <text x="120" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle" opacity="0.7">🌊 FLOOD ZONE</text>
  <text x="430" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#dc2626" text-anchor="middle" opacity="0.7">🌡️ HEAT ZONE</text>
  <text x="640" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#059669" text-anchor="middle" opacity="0.7">💧 WATER STRESS</text>
</svg>